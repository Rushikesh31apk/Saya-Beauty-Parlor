<div class="panel"><form method="post" class="row g-3">
  <div class="col-md-6"><label class="form-label">Service Name</label><input class="form-control" name="name" value="{{ service.name if service else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Category</label><select class="form-select" name="category">{% for c in ['Hair','Skin','Makeup','Bridal','Spa','Nails','Mehendi'] %}<option {% if service and service.category==c %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></div>
  <div class="col-md-4"><label class="form-label">Price</label><input class="form-control" type="number" step="0.01" name="price" value="{{ service.price if service else '' }}" required></div>
  <div class="col-md-4"><label class="form-label">Duration</label><input class="form-control" name="duration" value="{{ service.duration if service else '' }}"></div>
  <div class="col-md-4"><label class="form-label">Status</label><select class="form-select" name="status"><option {% if service and service.status=='Active' %}selected{% endif %}>Active</option><option {% if service and service.status=='Inactive' %}selected{% endif %}>Inactive</option></select></div>
  <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3">{{ service.description if service else '' }}</textarea></div>
  <div class="col-12"><button class="btn btn-rose">Save Service</button> <a href="{{ url_for('admin_services') }}" class="btn btn-light">Cancel</a></div>
</form></div>
