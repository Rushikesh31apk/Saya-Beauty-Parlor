{% extends 'base.html' %}
{% block title %}Manager Login — Saya Beauty Parlor{% endblock %}

{% block content %}
<div class="login-page">

  <!-- Decorative petals -->
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
    <div style="position:absolute;top:10%;left:8%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(200,65,107,.18),transparent 70%);filter:blur(60px);"></div>
    <div style="position:absolute;bottom:15%;right:6%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,152,62,.14),transparent 70%);filter:blur(80px);"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(92,24,100,.3),transparent 70%);filter:blur(120px);"></div>
  </div>

  <!-- Floating label top -->
  <div style="position:absolute;top:28px;left:50%;transform:translateX(-50%);z-index:2;">
    <a href="{{ url_for('index') }}" style="display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:.82rem;font-weight:500;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.5)'">
      <i class="fa-solid fa-arrow-left" style="font-size:.7rem;"></i> Back to Website
    </a>
  </div>

  <div class="login-card" style="position:relative;z-index:1;">
    <!-- Brand -->
    <div style="text-align:center;margin-bottom:28px;">
      <span class="login-logo">Saya</span>
      <div style="display:inline-flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 4px;">
        <div style="height:1px;width:40px;background:linear-gradient(90deg,transparent,rgba(201,152,62,.6));"></div>
        <i class="fa-solid fa-spa" style="color:rgba(201,152,62,.7);font-size:.75rem;"></i>
        <div style="height:1px;width:40px;background:linear-gradient(90deg,rgba(201,152,62,.6),transparent);"></div>
      </div>
      <p style="color:rgba(255,255,255,.45);font-size:.83rem;letter-spacing:.4px;">Manager Access Portal</p>
    </div>

    <!-- Form -->
    <form method="post" style="display:flex;flex-direction:column;gap:18px;">
      <div>
        <label class="login-label"><i class="fa-solid fa-user" style="margin-right:6px;opacity:.6;"></i>Username</label>
        <input class="login-input" type="text" name="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div>
        <label class="login-label"><i class="fa-solid fa-lock" style="margin-right:6px;opacity:.6;"></i>Password</label>
        <div style="position:relative;">
          <input class="login-input" type="password" name="password" placeholder="Enter password" required id="loginPwd" autocomplete="current-password" style="padding-right:48px;">
          <button type="button" onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:.9rem;" id="eyeBtn">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <!-- Remember -->
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" style="width:16px;height:16px;accent-color:#c9983e;">
          <span style="color:rgba(255,255,255,.55);font-size:.82rem;">Remember me</span>
        </label>
        <a href="#" style="color:rgba(201,152,62,.8);font-size:.82rem;font-weight:600;text-decoration:none;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login" style="margin-top:6px;">
        <i class="fa-solid fa-key" style="margin-right:8px;"></i>Login to Dashboard
      </button>
    </form>

    <div class="login-divider">Saya Beauty Parlor</div>

    <a href="{{ url_for('index') }}" class="btn-back-login">
      <i class="fa-solid fa-store" style="margin-right:8px;"></i>View Parlor Website
    </a>

    <p style="text-align:center;margin-top:20px;color:rgba(255,255,255,.25);font-size:.75rem;">
      © {{ current_year }} Saya Beauty Parlor · Secure Portal
    </p>
  </div>
</div>

<script>
function togglePwd() {
  const inp = document.getElementById('loginPwd');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'fa-solid fa-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'fa-solid fa-eye';
  }
}
</script>
{% endblock %}
